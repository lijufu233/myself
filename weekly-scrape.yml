name: Weekly Market Data Scrape

on:
  schedule:
    # Every Sunday at 09:00 UTC (05:00 Eastern)
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if entry exists'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt

      - name: Run scraper
        run: |
          python scraper/scrape.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check for data changes
        id: check_changes
        run: |
          if git diff --quiet data/market_data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: weekly market update ${{ github.run_id }} [skip ci]"
          file_pattern: "data/market_data.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: No changes detected
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "No new data — data/market_data.json unchanged."
